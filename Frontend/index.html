<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SevaAI - Disaster Relief Network</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in sandboxed environments when scripts try to polyfill fetch.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { /* Ignore attempts to overwrite fetch */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Could not patch fetch descriptor:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
